apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "ailog.fullname" . }}-test-connection"
  labels:
{{ include "ailog.labels" . | indent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  containers:
    - name: wget
      image: busybox:1.36
      command: ['sh', '-c', 'wget -qO- {{ include "ailog.fullname" . }}:{{ .Values.service.port }} >/dev/null']
