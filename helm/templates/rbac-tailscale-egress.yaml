{{- if .Values.tailscale.egress.enabled -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "ailog.fullname" . }}-tailscale-egress
  labels:
{{ include "ailog.labels" . | indent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["tailscale"]
    verbs: ["get","update","patch","create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "ailog.fullname" . }}-tailscale-egress
  labels:
{{ include "ailog.labels" . | indent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "ailog.serviceAccountName" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "ailog.fullname" . }}-tailscale-egress
{{- end }}
